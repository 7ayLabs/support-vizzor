# /etc/nginx/sites-available/support.vizzor.ai.conf
#
# Reverse proxy for support.vizzor.ai (port 7130) and
# test-support.vizzor.ai (port 7131). Let's Encrypt managed via certbot.
#
# Install:
#   sudo cp support.vizzor.ai.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/support.vizzor.ai.conf \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d support.vizzor.ai -d test-support.vizzor.ai
#   sudo nginx -t && sudo systemctl reload nginx

# ── prod ───────────────────────────────────────────────────────────────
server {
    server_name support.vizzor.ai;

    location / {
        proxy_pass http://127.0.0.1:7130;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;
    }

    # Reasonable upload ceiling for a ticket — descriptions are capped
    # at 8 KB in the app layer; this is belt-and-suspenders.
    client_max_body_size 64k;

    # certbot-managed TLS — these lines auto-injected after
    # `certbot --nginx -d support.vizzor.ai`.
    listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/support.vizzor.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/support.vizzor.ai/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = support.vizzor.ai) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name support.vizzor.ai;
    return 404;
}

# ── staging ────────────────────────────────────────────────────────────
server {
    server_name test-support.vizzor.ai;

    location / {
        proxy_pass http://127.0.0.1:7131;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    client_max_body_size 64k;

    listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/test-support.vizzor.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/test-support.vizzor.ai/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = test-support.vizzor.ai) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name test-support.vizzor.ai;
    return 404;
}
